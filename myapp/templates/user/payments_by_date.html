<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments for {{ today|date:"F Y" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <h2 class="text-center mb-4">Payments Due on {{ today|date:"F 1st, Y" }}</h2>
        
        {% if payments %}
            <div class="list-group">
                {% for payment in payments %}
                    <div class="list-group-item">
                        <h5>{{ payment.applicant_name }}</h5>
                        <p><strong>Loan Amount:</strong> ${{ payment.loan_amount }}</p>
                        <p><strong>EMI:</strong> ${{ payment.calculate_payment }}</p>
<button class="btn btn-primary" onclick="window.location.href='{% url 'payment_form' payment.id %}'">Pay Now</button>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="text-center text-muted">No payments due this month.</p>
        {% endif %}
    </div>

    <script>
        function makePayment(loanId) {
            // Redirect to the payment page or process payment
            window.location.href = `/enable-payment/${loanId}/`;
        }
    </script>
</body>
</html>
