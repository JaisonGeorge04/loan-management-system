<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>EMI Calculator</h3>
                <p class="mb-0">Enter loan details below</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <!-- Principal Amount -->
                    <div class="mb-3">
                        <label for="principal" class="form-label">Loan Amount (₹)</label>
                        <input type="number" name="principal" id="principal" class="form-control" placeholder="Enter loan amount" required>
                    </div>
                    
                    <!-- Annual Interest Rate -->
                    <div class="mb-3">
                        <label for="annual_rate" class="form-label">Annual Interest Rate (%)</label>
                        <input type="number" step="0.01" name="annual_rate" id="annual_rate" class="form-control" placeholder="Enter interest rate" required>
                    </div>
                    
                    <!-- Loan Tenure -->
                    <div class="mb-3">
                        <label for="tenure_years" class="form-label">Loan Tenure (in years)</label>
                        <input type="number" name="tenure_years" id="tenure_years" class="form-control" placeholder="Enter tenure in years" required>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary w-50">Calculate EMI</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
