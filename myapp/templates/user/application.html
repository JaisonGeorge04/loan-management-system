<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Application Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h3>Loan Application Form</h3>
                <p class="mb-0">Fill in the details below to apply for a loan</p>
            </div>
            <div class="card-body">
                <form  method="POST" enctype="multipart/form-data">
                    <!-- CSRF Token (Django will auto-inject this if using the `{% csrf_token %}` tag) -->
                    <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

                    <!-- Loan Type -->
                    <div class="mb-3">
                        <label for="loan_type" class="form-label">Loan Type</label>
                        <select name="loan_type" id="loan_type" class="form-control" required>
                            <option value="" disabled selected>Select Loan Type</option>
                            {% for i in loan %}
                            <option value="{{i.name}}">{{i.name}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Loan Amount -->
                    <div class="mb-3">
                        <label for="loan_amount" class="form-label">Loan Amount</label>
                        <input type="number" name="loan_amount" id="loan_amount" class="form-control" placeholder="Enter loan amount" required>
                    </div>

                    <!-- Interest Rate -->
                    <div class="mb-3">
                        <label for="interest_rate" class="form-label">Interest Rate (%)</label>
                        <input type="number" step="0.01" name="interest_rate" id="interest_rate" class="form-control" placeholder="Enter interest rate" required>
                    </div>

                    <!-- Loan Tenure -->
                    <div class="mb-3">
                        <label for="loan_tenure" class="form-label">Loan Tenure (in months)</label>
                        <input type="number" name="loan_tenure" id="loan_tenure" class="form-control" placeholder="Enter loan tenure in months" required>
                    </div>

                    <!-- Documents -->
                    <div class="mb-3">
                        <label for="documents" class="form-label">Upload Documents</label>
                        <input type="file" name="documents" id="documents" class="form-control">
                        <div class="form-text">Upload necessary documents (e.g., salary slips, ID proof)</div>
                    </div>

                    <!-- Remarks -->
                    <div class="mb-3">
                        <label for="remarks" class="form-label">Remarks (Optional)</label>
                        <textarea name="remarks" id="remarks" class="form-control" rows="3" placeholder="Add any additional comments"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary w-50">Submit Application</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
